<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter Digest</title>
  <meta name="description" content="Daily AI/PM newsletter digest — an autonomous agent template.">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <main>
    <header class="site-header">
      <h1>Newsletter Digest</h1>
      <p class="subtitle">Daily AI/PM scan · updated at 5pm ET</p>
    </header>

    <section id="today" aria-label="Today's digest">
      <p class="loading">Loading today's digest…</p>
    </section>

    <section id="archive" aria-label="Archive">
      <h2>Archive</h2>
      <ul id="archive-list"></ul>
    </section>

    <footer class="site-footer">
      <p>Generated by the <code>newsletter-digest</code> scheduled task.</p>
    </footer>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
